<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malla Interactiva Ingeniería Civil en Computación</title>
    <link rel="stylesheet" href="style.css?v=5">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-text">UOH</div>
        </div>
        <h1>Malla Interactiva Ingeniería Civil en Computación</h1>
        <div class="header-info">
            <div class="school-name">Escuela de Ingeniería</div>
            <div class="degree-title">Ingeniero(a) Civil en Computación</div>
        </div>
    </div>

    <div class="malla-container">
        <div class="grid-wrapper">
            <div class="year-headers">
                <div class="year-header">Primer Año</div>
                <div class="year-header">Segundo Año</div>
                <div class="year-header">Tercer Año</div>
                <div class="year-header">Cuarto Año</div>
                <div class="year-header">Quinto Año</div>
            </div>

            <div class="semester-headers">
                <div class="semester-header">I</div>
                <div class="semester-header">II</div>
                <div class="semester-header">III</div>
                <div class="semester-header">IV</div>
                <div class="semester-header">V</div>
                <div class="semester-header">VI</div>
                <div class="semester-header">VII</div>
                <div class="semester-header">VIII</div>
                <div class="semester-header">IX</div>
                <div class="semester-header">X</div>
            </div>

            <div class="courses-container" id="coursesContainer">
            </div>

            <div class="practice-section" id="practiceSection">
                <div class="practice-section-header">Verano</div>
                <div class="practice-courses" id="practiceCourses">
                </div>
            </div>
        </div>
    </div>
